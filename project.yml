name: OSA
options:
  bundleIdPrefix: com.etherealogic
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  OSA:
    type: application
    platform: iOS
    sources:
      - path: OSA
        excludes:
          - "Resources/**"
          - "**/*.md"
      - path: OSA/Resources/Assets.xcassets
        buildPhase: resources
      - path: OSA/Resources/SeedContent
        buildPhase: resources
        type: folder
    entitlements:
      path: OSA/OSA.entitlements
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: Lantern
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Lantern uses your location to show nearby shelters, evacuation routes, and local weather forecasts on the map."
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  OSATests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OSATests
        excludes:
          - "**/*.md"
    dependencies:
      - target: OSA
  OSAUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OSAUITests
        excludes:
          - "**/*.md"
    dependencies:
      - target: OSA
    settings:
      base:
        TEST_TARGET_NAME: OSA
